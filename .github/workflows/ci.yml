name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/insta_saved_test?schema=public
  DATABASE_DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/insta_saved_test?schema=public
  AUTH_SECRET: ci-only-secret-not-used-outside-github-actions
  ADMIN_PASSWORD_HASH: ci-placeholder
  AUTH_DISABLED: "false"
  APP_OWNER_ID: ci-owner
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  IMPORT_MAX_BYTES: "1000000"

jobs:
  quality:
    name: Lint, types, unit tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insta_saved_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d insta_saved_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Apply migrations to ephemeral database
        run: npm run db:deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  e2e:
    name: Browser tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: insta_saved_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d insta_saved_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate Prisma Client and apply migrations
        run: |
          npm run db:generate
          npm run db:deploy
          npm run db:seed

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
